
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management - Executive Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .metric-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 4px solid #667eea;
        }
        
        .metric-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        
        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }
        
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            height: 400px;
        }
        
        canvas {
            max-height: 350px;
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🏨 Hotel Management Dashboard</h1>
            <p>Generated: 2026-04-09 10:56:04</p>
        </div>
        
        <div class="metrics">
            <div class="metric-card">
                <h3>Total Bookings</h3>
                <div class="metric-value">3</div>
            </div>
            <div class="metric-card">
                <h3>Total Revenue</h3>
                <div class="metric-value">₹6,700</div>
            </div>
            <div class="metric-card">
                <h3>Unique Guests</h3>
                <div class="metric-value">2</div>
            </div>
            <div class="metric-card">
                <h3>Avg Booking Value</h3>
                <div class="metric-value">₹2,234</div>
            </div>
        </div>
        
        <div class="charts">
            <div class="chart-container">
                <canvas id="bookingsChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="revenueChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="itemsChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="dailyRevenueChart"></canvas>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 Hotel Management System | Executive Analytics Dashboard</p>
        </div>
    </div>
    
    <script>
        // Chart 1: Bookings by User
        const ctx1 = document.getElementById('bookingsChart').getContext('2d');
        new Chart(ctx1, {
            type: 'doughnut',
            data: {
                labels: ["Ravi", "Arun"],
                datasets: [{
                    data: [2, 1],
                    backgroundColor: ['#667eea', '#764ba2', '#f093fb'],
                    borderColor: 'white',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    },
                    title: {
                        display: true,
                        text: 'Bookings by Guest'
                    }
                }
            }
        });
        
        // Chart 2: Revenue by User
        const ctx2 = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ["Ravi", "Arun"],
                datasets: [{
                    label: 'Revenue (₹)',
                    data: [3700, 3000],
                    backgroundColor: '#667eea',
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                plugins: {
                    legend: {
                        display: false
                    },
                    title: {
                        display: true,
                        text: 'Revenue by Guest'
                    }
                }
            }
        });
        
        // Chart 3: Items Ordered
        const ctx3 = document.getElementById('itemsChart').getContext('2d');
        new Chart(ctx3, {
            type: 'bar',
            data: {
                labels: ["Room", "Food", "Laundry"],
                datasets: [{
                    label: 'Quantity Ordered',
                    data: [4, 5, 1],
                    backgroundColor: ['#667eea', '#764ba2', '#f093fb'],
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    },
                    title: {
                        display: true,
                        text: 'Items Ordered'
                    }
                }
            }
        });
        
        // Chart 4: Daily Revenue Trend
        const ctx4 = document.getElementById('dailyRevenueChart').getContext('2d');
        new Chart(ctx4, {
            type: 'line',
            data: {
                labels: ["Nov 10", "Nov 15", "Nov 20"],
                datasets: [{
                    label: 'Daily Revenue (₹)',
                    data: [1500, 2000, 3200],
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    pointRadius: 6,
                    pointBackgroundColor: '#667eea',
                    pointBorderColor: 'white',
                    pointBorderWidth: 2,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    },
                    title: {
                        display: true,
                        text: 'Revenue Trend'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
